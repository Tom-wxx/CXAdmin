# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8

# Spring 配置
spring:
  application:
    name: admin-system
  profiles:
    active: dev
  # 启用彩色日志输出
  output:
    ansi:
      enabled: always
  # 解决Swagger与Spring Boot 2.6+的兼容性问题
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # DevTools 热部署配置
  devtools:
    restart:
      # 启用热部署
      enabled: true
      # 设置重启的目录
      additional-paths: src/main/java
      # 排除不需要重启的资源
      exclude: static/**,public/**,templates/**
    livereload:
      # 启用浏览器自动刷新（可选）
      enabled: true
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      url: jdbc:mysql://localhost:3306/admin_system?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
      username: root
      password: root
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # Web监控配置
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 10s
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 200
        # 连接池最大阻塞等待时间
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 10
        # 连接池中的最小空闲连接
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 总上传大小
      max-request-size: 20MB

  # Jackson配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus 配置
mybatis-plus:
  # mapper xml 文件路径
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: com.admin.system.entity
  configuration:
    # 驼峰下划线转换
    map-underscore-to-camel-case: true
    # 开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键类型
      id-type: AUTO
      # 逻辑删除字段
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0

# PageHelper分页插件
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# JWT配置
jwt:
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz123456
  # 令牌有效期（默认30分钟）
  expireTime: 30
  # 刷新令牌有效期（默认7天）
  refreshTime: 10080

# Swagger配置
swagger:
  enabled: true
  title: '后台管理系统 API'
  description: '后台管理系统接口文档'
  version: '1.0.0'
  contact:
    name: Admin
    email: admin@example.com

# 文件上传配置
file:
  upload:
    # 文件上传路径（绝对路径）
    path: D:/uploads
    # 文件访问URL前缀
    prefix: /uploads
    # 单个文件最大大小（MB）
    max-size: 100
    # 允许的文件类型（逗号分隔，*表示所有类型）
    allowed-types: jpg,jpeg,png,gif,bmp,webp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,zip,rar,7z,mp4,mp3

# 日志配置
logging:
  level:
    root: info
    com.admin.system: debug
    # 特定组件日志级别
    org.springframework.web: info
    org.springframework.security: debug
    com.alibaba.druid: info
  pattern:
    # 彩色控制台输出格式
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%15.15t]){faint} %clr(%-5level){green} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx'
    # 文件输出格式（无颜色）
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/admin-system.log
    max-size: 10MB
    max-history: 30

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: CXAdmin
    version: 1.0.0
    description: 企业级后台管理系统
